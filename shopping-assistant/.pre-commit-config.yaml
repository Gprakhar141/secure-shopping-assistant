repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [python]
      - id: end-of-file-fixer
        name: end of file fixer
        entry: end-of-file-fixer
        language: system
        types: [python]
      - id: semgrep
        name: semgrep security scan
        entry: semgrep scan --config shopping-assistant/.semgrep/rules.yaml --error
        language: system
        types: [python]
